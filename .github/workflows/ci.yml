name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  CARGO_TERM_COLOR: always

jobs:
  client:
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact: pomc-client-windows
            binary: target/release/pomc.exe
          - os: ubuntu-latest
            artifact: pomc-client-linux
            binary: target/release/pomc
          - os: macos-latest
            artifact: pomc-client-macos
            binary: target/release/pomc
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: clippy, rustfmt

      - name: Install Vulkan SDK (Linux)
        if: runner.os == 'Linux'
        run: |
          wget -qO- https://packages.lunarg.com/lunarg-signing-key-pub.asc | sudo tee /etc/apt/trusted.gpg.d/lunarg.asc
          sudo wget -qO /etc/apt/sources.list.d/lunarg-vulkan-jammy.list https://packages.lunarg.com/vulkan/lunarg-vulkan-jammy.list
          sudo apt-get update
          sudo apt-get install -y vulkan-sdk libxkbcommon-dev libwayland-dev

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: client-${{ runner.os }}
          cache-on-failure: true

      - name: Format check
        if: runner.os == 'Windows'
        run: cargo fmt -- --check

      - name: Clippy
        if: runner.os == 'Windows'
        run: cargo clippy --release --all-targets --all-features -- -D warnings

      - name: Build
        run: cargo build --release

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.binary }}

  launcher-backend:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: launcher/src-tauri
          shared-key: launcher
          cache-on-failure: true

      - name: Format check
        working-directory: launcher/src-tauri
        run: cargo fmt -- --check

      - name: Clippy
        working-directory: launcher/src-tauri
        run: cargo clippy --release --all-targets --all-features -- -D warnings

  launcher-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v5
        with:
          version: 9

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: launcher/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: launcher
        run: pnpm install

      - name: Format check
        working-directory: launcher
        run: pnpm format:check

      - name: Lint
        working-directory: launcher
        run: pnpm lint

      - name: Type check
        working-directory: launcher
        run: pnpm exec tsc --noEmit

      - name: Build
        working-directory: launcher
        run: pnpm exec vite build
